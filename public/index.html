<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RC Tractoparts — Iniciar sesión</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-page">

  <div class="auth-card">

    <!-- Branding -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <img src="/assets/images/rc_logo.png"
             alt="RC Tractoparts"
             class="auth-logo-img"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
        <span class="auth-logo-fallback" aria-hidden="true">⚙</span>
      </div>
      <h1>RC Tractoparts</h1>
      <p>Sistema de Gestión de Cotizaciones</p>
    </div>

    <!-- Login form -->
    <form id="login-form" novalidate autocomplete="on">

      <!-- Username field -->
      <div class="form-group" id="fg-username">
        <label class="form-label" for="username">Usuario</label>
        <input
          class="form-control"
          type="text"
          id="username"
          name="nombre_usuario"
          autocomplete="username"
          placeholder="Ingrese su usuario"
          spellcheck="false"
          autocapitalize="none"
        />
        <span class="field-error" id="err-username" role="alert"></span>
      </div>

      <!-- Password field -->
      <div class="form-group" id="fg-password">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-password-wrapper">
          <input
            class="form-control"
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="Ingrese su contraseña"
          />
          <button
            type="button"
            class="btn-password-toggle"
            id="btn-toggle-password"
            aria-label="Mostrar contraseña"
            tabindex="0"
          >
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
                 class="hidden">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
                       a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4
                       c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19
                       m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="err-password" role="alert"></span>
      </div>

      <!-- General alert (401 / 429 / network errors) -->
      <div class="form-alert" id="form-alert" role="alert"></div>

      <!-- Submit -->
      <button type="submit" id="btn-login" class="btn btn-primary btn-full btn-lg">
        <span class="btn-label" id="btn-label">Iniciar sesión</span>
        <span class="spinner hidden" id="btn-spinner" aria-hidden="true"></span>
      </button>

    </form>

    <p class="auth-footer">RC Tractoparts &copy; 2026 &mdash; v2.0</p>
  </div>

  <!-- View controller — type="module" defers execution until DOM is ready -->
  <script type="module" src="/js/views/authView.js"></script>
</body>
</html>
